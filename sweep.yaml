project: structured-urban-synthesis
program: src/train.py
method: random
metric:
  name: val_loss
  goal: minimize
parameters:
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3
  batch_size:
    values: [64, 128]
  patch_size:
    values: [8, 16]
  depth:
    values: [6, 12, 18]
  num_heads:
    values: [4, 8, 12]
  epochs:
    value: 50
early_terminate:
  type: hyperband
  min_iter: 5
  eta: 3
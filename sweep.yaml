program: src/train.py
method: hyperband
metric:
  name: epoch_loss
  goal: minimize
parameters:
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3
  batch_size:
    values: [16, 32]
  patch_size:
    values: [4, 8, 16]
  depth:
    values: [6, 12, 18]
  num_heads:
    values: [4, 8]
  epochs:
    value: 50
early_terminate:
  type: hyperband
  smin: 5
  eta: 3
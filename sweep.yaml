project: structured-urban-synthesis
program: src/train.py
method: random
metric:
  name: val_loss
  goal: minimize
parameters:
  lr_batch:
    values:
      - "1e-4,32"
      - "2e-4,64"
      - "4e-4,128"
      - "8e-4,128"
  patch_size:
    values: [8, 16]
  cfg_dropout:
    values: [0.05, 0.1, 0.15]
  depth:
    values: [4, 6, 8, 12]
  num_heads:
    values: [4, 6, 8, 12]
  head_dim:
    value: 64
  warmup_epochs:
    values: [3, 5]
  epochs:
    value: 100
early_terminate:
  type: hyperband
  min_iter: 20
  eta: 3